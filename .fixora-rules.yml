rules:
- id: fixora-wrapper-execute-background-task
  pattern: "def execute_background_task(...):\n  ..."
  message: 'Vulnerable function ''execute_background_task()'' wraps shlex.split, subprocess.run.
    Vulnerability: Command Injection. Although the function uses shlex.split and shell=False
    to prevent injection, it still executes a shell command which could potentially
    be exploited if the input is not properly sanitized.'
  severity: INFO
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Command Injection
    confidence: LOW
    wrapper_defined_in: core/system.py
    wraps:
    - shlex.split
    - subprocess.run
    modules_used:
    - subprocess
    - shlex
    cwe:
    - CWE-78
    owasp:
    - A03:2021
- id: fixora-wrapper-upload-file
  pattern: "def upload_file(...):\n  ..."
  message: 'Vulnerable function ''upload_file()'' wraps os.path.join, open. Vulnerability:
    Path Traversal. The function uses os.path.join to construct the file path, which
    could potentially be exploited if the filename is not properly sanitized.'
  severity: INFO
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: LOW
    wrapper_defined_in: api/files.py
    wraps:
    - os.path.join
    - open
    modules_used:
    - os
    cwe:
    - CWE-22
    owasp:
    - A01:2021
